name: DevSecOps CI Pipeline

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # NEW: Grant the runtime token permission to read code and write container packages
    permissions:
      contents: read
      packages: write
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Semgrep SAST Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: p/default

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run unit tests
      run: ./mvnw clean test

    # NEW: Securely log into GitHub Packages Registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

# Step 6: Build and push the image using a lowercase path name and step id
    - name: Build and Push secure Docker image
      id: build # 1. Added ID for tracking
      run: |
        LOW_CASE_REPO=$(echo "ghcr.io/${{ github.repository }}/user-api" | tr '[:upper:]' '[:lower:]')
        docker build --pull -t $LOW_CASE_REPO:${{ github.sha }} .
        docker push $LOW_CASE_REPO:${{ github.sha }}
        # 2. Changed from $GITHUB_ENV to $GITHUB_OUTPUT
        echo "target_image_tag=$LOW_CASE_REPO:${{ github.sha }}" >> $GITHUB_OUTPUT

    # Step 7: SCA Container Scan
    - name: Run Trivy SCA Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        # 3. Referenced via explicit step outputs
        image-ref: ${{ steps.build.outputs.target_image_tag }}
        format: 'table'
        exit-code: '1'
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Step 8: IaC Scanning
    - name: Run Checkov IaC Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/
        framework: terraform
        soft_fail: false

    # Step 9: Setup Terraform Engine on the runner
    - name: Setup HashiCorp Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # Step 10: Initialize and Deploy Staging Infrastructure
    - name: Terraform Apply (Provision Environment)
      id: deploy 
      run: |
        cd terraform
        terraform init
        # 4. Input parameter now reads from the build step output
        terraform apply -auto-approve \
          -var="image_tag=${{ steps.build.outputs.target_image_tag }}" \
          -var="github_token=${{ secrets.GITHUB_TOKEN }}" \
          -var="github_actor=${{ github.actor }}"
        
        STAGING_IP=$(terraform output -raw staging_instance_public_ip)
        echo "staging_ip=$STAGING_IP" >> $GITHUB_OUTPUT

    # Step 11: Advanced health check loop with explicit HTTP status code tracing
    - name: Wait for Application Initialization
      run: |
        echo "Polling http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users (max 15 min)..."
        for i in {1..60}; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 5 --max-time 10 \
            http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users || echo "000")
          
          echo "Attempt $i/60 — HTTP Response: $HTTP_CODE"
          
          if echo "$HTTP_CODE" | grep -qE "^(200|201|401|403|404)$"; then
            echo "Application is live and reachable!"
            exit 0
          fi
          sleep 15
        done
        echo "Application failed to become responsive after 15 minutes." && exit 1

    # Step 12: Run OWASP ZAP DAST Baseline Scan
    - name: Run OWASP ZAP DAST Baseline Scan
      uses: zaproxy/action-baseline@v0.14.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users'
        fail_action: false

    # Step 13: CRITICAL TEARDOWN
    - name: Terraform Destroy (Teardown Environment)
      if: always()
      run: |
        cd terraform
        # 5. Input parameter here also reads from the build step output
        terraform destroy -auto-approve \
          -var="image_tag=${{ steps.build.outputs.target_image_tag }}" \
          -var="github_token=${{ secrets.GITHUB_TOKEN }}" \
          -var="github_actor=${{ github.actor }}"