name: DevSecOps CI Pipeline

# Trigger the workflow on pull requests targeting the master branch
on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository code onto the runner
    - name: Checkout source code
      uses: actions/checkout@v4

    # Step 2: Install Java 17 runtime environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Step 3: Run unit tests using the H2 in-memory profile
    - name: Run unit tests
      run: ./mvnw clean test

    # Step 4: Validate that the multi-stage Dockerfile builds successfully
    - name: Build secure Docker image
      run: |
        docker build -t user-api:test .