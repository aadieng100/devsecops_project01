name: DevSecOps CI Pipeline

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Inject our secure AWS credentials into the environment execution context
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
    # Step 1: Clone code
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Secret Scanning
    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Step 3: SAST Scan
    - name: Run Semgrep SAST Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: p/default

    # Step 4: Java Setup
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Step 5: Unit Testing
    - name: Run unit tests
      run: ./mvnw clean test

    # Step 6: Build secure Container
    - name: Build secure Docker image
      run: |
        docker build --pull -t user-api:${{ github.sha }} .

    # Step 7: SCA Container Scan
    - name: Run Trivy SCA Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'user-api:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Step 8: IaC Scanning
    - name: Run Checkov IaC Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/
        framework: terraform
        soft_fail: false

    # ==========================================
    # NEW: EPHEMERAL STAGING & DAST LIFECYCLE
    # ==========================================

    # Step 9: Setup Terraform Engine on the runner
    - name: Setup HashiCorp Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # Step 10: Initialize and Deploy Staging Infrastructure
    - name: Terraform Apply (Provision Environment)
      id: deploy
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve
        
        # Extract the public IP and expose it as a step output (linter-safe, modern pattern)
        STAGING_IP=$(terraform output -raw staging_instance_public_ip)
        echo "staging_ip=$STAGING_IP" >> $GITHUB_OUTPUT

    # Step 11: Execute OWASP ZAP DAST Baseline Scan
    - name: Run OWASP ZAP DAST Baseline Scan
      uses: zaproxy/action-baseline@v0.14.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users'
        rules_file_name: '.zap/rules.tsv'
        fail_action: false # Keeps the pipeline running so the teardown step is guaranteed to hit

    # Step 12: CRITICAL TEARDOWN - Always destroy cloud assets, whether the build fails or succeeds
    - name: Terraform Destroy (Teardown Environment)
      if: always()
      run: |
        cd terraform
        terraform destroy -auto-approve