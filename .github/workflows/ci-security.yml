name: DevSecOps CI Pipeline

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Semgrep SAST Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: p/default

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run unit tests
      run: ./mvnw clean test

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push secure Docker image
      id: build 
      run: |
        LOW_CASE_REPO=$(echo "ghcr.io/${{ github.repository }}/user-api" | tr '[:upper:]' '[:lower:]')
        docker build --pull -t $LOW_CASE_REPO:${{ github.sha }} .
        docker push $LOW_CASE_REPO:${{ github.sha }}
        echo "target_image_tag=$LOW_CASE_REPO:${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Run Trivy SCA Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ steps.build.outputs.target_image_tag }}
        format: 'table'
        exit-code: '1'
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Checkov IaC Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/
        framework: terraform
        soft_fail: false

    - name: Setup HashiCorp Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Apply (Provision Environment)
      id: deploy
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve \
          -var="image_tag=${{ steps.build.outputs.target_image_tag }}" \
          -var="github_token=${{ secrets.GITHUB_TOKEN }}" \
          -var="github_actor=${{ github.actor }}"
        
        STAGING_IP=$(terraform output -raw staging_instance_public_ip)
        echo "staging_ip=$STAGING_IP" >> $GITHUB_OUTPUT

    - name: Wait for Application Initialization
      run: |
        echo "Polling http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users (max 15 min)..."
        for i in {1..60}; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 5 --max-time 10 \
            http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users || echo "000")
          
          echo "Attempt $i/60 — HTTP Response: $HTTP_CODE"
          
          if echo "$HTTP_CODE" | grep -qE "^(200|201|401|403|404|405)$"; then
            echo "Application is live and reachable!"
            exit 0
          fi
          sleep 15
        done
        echo "Application failed to become responsive after 15 minutes." && exit 1

    # ==========================================
    # ADDED BACK: OWASP ZAP LIVE EXPLOIT SCAN
    # ==========================================
    - name: Run OWASP ZAP DAST Baseline Scan
      uses: zaproxy/action-baseline@v0.14.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'http://${{ steps.deploy.outputs.staging_ip }}:8080/api/users'
        # fail_action: false ensures the pipeline continues to execution even if vulnerabilities 
        # are detected, guaranteeing that the teardown step runs to destroy our AWS resources.
        fail_action: false

    # TELEMETRY INTERCEPTOR (Runs ONLY if the health check loop crashes)
    - name: Fetch EC2 Boot & Application Logs
      if: failure()
      run: |
        echo "Pipeline check failed. Querying AWS API for real-time console telemetry..."
        cd terraform
        INSTANCE_ID=$(terraform output -raw staging_instance_id)
        echo "Target Instance identified: $INSTANCE_ID"
        echo "========================================================================"
        echo "                      AWS REMOTE SERVER SYSTEM LOGS                     "
        echo "========================================================================"
        aws ec2 get-console-output --instance-id $INSTANCE_ID --output text
        echo "========================================================================"

    # CRITICAL TEARDOWN (Always executes to protect your wallet and credits)
    - name: Terraform Destroy (Teardown Environment)
      if: always()
      run: |
        cd terraform
        terraform destroy -auto-approve \
          -var="image_tag=${{ steps.build.outputs.target_image_tag }}" \
          -var="github_token=${{ secrets.GITHUB_TOKEN }}" \
          -var="github_actor=${{ github.actor }}"