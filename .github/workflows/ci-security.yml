name: DevSecOps CI Pipeline

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Run Gitleaks Secret Scan
    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Step 3: Run SAST Scan (Semgrep) on our custom code
    - name: Run Semgrep SAST Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: p/owasp-top-10
      # 'p/owasp-top-10' focuses on the top 10 critical web application vulnerabilities

    # Step 4: Install Java 17 runtime environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Step 5: Run unit tests
    - name: Run unit tests
      run: ./mvnw clean test

    # Step 6: Build our secure multi-stage Docker image
    - name: Build secure Docker image
      run: |
        docker build -t user-api:${{ github.sha }} .

    # Step 7: Run SCA Scan (Trivy) on the compiled Docker image
    - name: Run Trivy SCA Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'user-api:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # This forces the pipeline to FAIL if severe vulnerabilities are found
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'