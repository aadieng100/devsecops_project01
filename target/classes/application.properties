# ─── DataSource ─────────────────────────────────────────────────────────────
# The three variables below MUST be defined in the environment
# (CI/CD pipeline, docker-compose, Kubernetes secret, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# update   → Hibernate creates / updates the table automatically (dev/test)
# validate  → Schema validation only in production (recommended with Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Print generated SQL queries (useful for debugging; disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Serveur ─────────────────────────────────────────────────────────────────
server.port=8080
